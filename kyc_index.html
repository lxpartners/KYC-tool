<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>KYC Risk Assessment</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,sans-serif}
body{background:#f8fafc;color:#1e293b;padding:32px 16px;min-height:100vh}
.wrap{max-width:560px;margin:0 auto;background:#fff;border-radius:14px;padding:32px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.toptag{font-size:11px;color:#94a3b8;letter-spacing:1.5px;margin-bottom:20px}
.pbar{height:3px;background:#e2e8f0;border-radius:2px;margin-bottom:28px}
.pfill{height:3px;background:#1e293b;border-radius:2px;transition:width .3s}
.ptitle{font-size:20px;font-weight:600;margin-bottom:4px}
.psub{font-size:13px;color:#64748b;margin-bottom:24px;line-height:1.5}
.flabel{font-size:13px;font-weight:600;color:#334155;margin-bottom:8px;margin-top:20px}
.opt{border:1px solid #e2e8f0;border-radius:10px;padding:13px 16px;cursor:pointer;margin-bottom:8px;background:#fff;transition:border-color .15s,background .15s}
.opt:hover{background:#f8fafc;border-color:#94a3b8}
.opt.sel{border:2px solid #1e293b;background:#f1f5f9}
.oname{font-size:13px;font-weight:600;color:#1e293b}
.odesc{font-size:12px;color:#64748b;margin-top:2px;line-height:1.4}
.row{display:flex;gap:10px;margin-top:28px}
.btn{padding:12px 20px;border-radius:10px;font-size:14px;cursor:pointer;border:1px solid #e2e8f0;background:#fff;color:#475569;font-weight:500;transition:background .15s}
.btn:hover{background:#f1f5f9}
.btnp{flex:1;background:#1e293b;color:#fff;border-color:#1e293b;font-weight:600}
.btnp:hover{background:#334155}
.btnp.off{background:#e2e8f0;color:#94a3b8;border-color:#e2e8f0;cursor:default}
.shortcuts{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.sc{padding:6px 14px;font-size:12px;border:1px solid #e2e8f0;border-radius:8px;cursor:pointer;background:#fff;color:#64748b;transition:background .15s}
.sc:hover{background:#f1f5f9}
.dinput{width:100%;padding:11px 12px 11px 28px;font-size:15px;border:1px solid #e2e8f0;border-radius:10px;outline:none;transition:border-color .15s}
.dinput:focus{border-color:#1e293b}
.ewrap{position:relative;margin-bottom:12px}
.esign{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:14px;pointer-events:none}
.hint{font-size:11px;color:#94a3b8;line-height:1.7;margin-bottom:20px}
/* Result */
.rbadge{border-radius:12px;padding:28px 24px;text-align:center;margin-bottom:20px}
.rlevel{font-size:46px;font-weight:700;letter-spacing:-2px;margin-bottom:4px}
.rscore{font-size:15px;font-weight:500}
.barwrap{margin:20px 0 6px}
.bartrack{display:flex;height:8px;border-radius:4px;overflow:hidden;margin-bottom:6px}
.arrowrow{position:relative;height:16px}
.arrowptr{position:absolute;width:0;height:0;border-left:7px solid transparent;border-right:7px solid transparent;border-bottom:12px solid #1e293b;transition:left .5s ease}
.barlabels{display:flex;justify-content:space-between;font-size:11px;color:#94a3b8;margin-top:4px}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.card{background:#f8fafc;border-radius:10px;padding:13px 16px;border:1px solid #f1f5f9}
.cardlabel{font-size:11px;color:#94a3b8;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.cardval{font-size:14px;font-weight:600;color:#1e293b}
.mbox{border:1px solid #f1f5f9;border-radius:12px;padding:18px 20px;margin-bottom:14px;background:#fafafa}
.mtitle{font-size:13px;font-weight:600;margin-bottom:12px;color:#334155}
.mrow{display:flex;gap:10px;margin-bottom:8px;align-items:flex-start}
.mtext{font-size:13px;color:#64748b;line-height:1.5}
.bkbtn{width:100%;padding:10px;border:1px solid #e2e8f0;border-radius:10px;cursor:pointer;font-size:13px;color:#64748b;background:#fff;margin-bottom:8px;transition:background .15s}
.bkbtn:hover{background:#f8fafc}
.bkwrap{margin-bottom:14px}
.bkrow{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bklabel{width:130px;font-size:12px;color:#64748b;flex-shrink:0}
.bktrack{flex:1;background:#e2e8f0;border-radius:4px;height:7px;overflow:hidden}
.bkfill{height:100%;border-radius:4px}
.bkval{width:36px;font-size:12px;font-weight:600;text-align:right;color:#1e293b}
.resetbtn{width:100%;padding:12px;border:1px solid #e2e8f0;border-radius:10px;cursor:pointer;font-size:13px;color:#64748b;background:#fff;transition:background .15s}
.resetbtn:hover{background:#f8fafc}
</style>
</head>
<body>
<div class="wrap">
  <div id="root"></div>
</div>
<script>
var W={customer_type:.18,pep_status:.25,product_risk:.05,transaction_behavior:.18,UBO_status:.10,geography_risk:.05,services:.09,debt_risk:.10};
var WLAB={customer_type:"Customer type",pep_status:"PEP status",product_risk:"Product risk",transaction_behavior:"Transaction behavior",UBO_status:"UBO status",geography_risk:"Geography",services:"Services",debt_risk:"Debt exposure"};
var PAGES=[
  {title:"Client profile",sub:"Basic information about the client",fields:[
    {key:"customer_type",label:"Who is the client?",opts:[
      {v:1,name:"Individual",desc:"Natural person, simple structure"},
      {v:2,name:"Company with UBOs",desc:"Legal entity with identified beneficial owners"},
      {v:3,name:"Complex structure",desc:"Multiple layers, trusts or opaque ownership"}
    ]},
    {key:"pep_status",label:"PEP exposure",opts:[
      {v:1,name:"No PEP",desc:"No political exposure identified"},
      {v:2,name:"Domestic PEP",desc:"Holds or held public office in Portugal"},
      {v:3,name:"Foreign PEP or Associate",desc:"Foreign official or close associate"}
    ]},
    {key:"geography_risk",label:"Geographic exposure",opts:[
      {v:1,name:"Portugal",desc:"Domestic client, low jurisdictional risk"},
      {v:2,name:"EU or Low-risk",desc:"Other EU states or FATF low-risk country"},
      {v:3,name:"High-risk country",desc:"FATF grey or black list or sanctioned jurisdiction"}
    ]}
  ]},
  {title:"Products and services",sub:"What the client will use",fields:[
    {key:"product_risk",label:"Product risk",opts:[
      {v:1,name:"Basic",desc:"Standard savings, deposits, plain vanilla"},
      {v:2,name:"Moderate",desc:"Investment products, structured notes"},
      {v:3,name:"High risk",desc:"Derivatives, leveraged products, alternatives"}
    ]},
    {key:"services",label:"Services requested",opts:[
      {v:1,name:"Low risk",desc:"Basic advisory, standard custody"},
      {v:2,name:"Medium risk",desc:"Active portfolio management, FX"},
      {v:3,name:"High risk",desc:"Private banking, international transfers, complex structures"}
    ]}
  ]},
  {title:"Ownership and behavior",sub:"Transparency and transaction profile",fields:[
    {key:"UBO_status",label:"Beneficial ownership",opts:[
      {v:1,name:"Identified - EU",desc:"All UBOs identified and EU-resident"},
      {v:2,name:"Identified - non-resident",desc:"UBOs known but based outside the EU"},
      {v:3,name:"Unidentified or Non-EU",desc:"UBOs unclear or in high-risk jurisdictions"}
    ]},
    {key:"transaction_behavior",label:"Transaction behavior",opts:[
      {v:1,name:"Low or Routine",desc:"Predictable, regular, and low-volume"},
      {v:2,name:"Medium",desc:"Some variation, moderate volume"},
      {v:3,name:"High or Unusual",desc:"Large, frequent, or unexplained movements"}
    ]}
  ]},
  {title:"Debt exposure",sub:"Total credit or debt exposure with the client (EUR)",isDebt:true}
];
var MEASURES={
  LOW:["Simple due diligence measures apply.","Review documents every 3 years or upon expiry."],
  MEDIUM:["Simple due diligence measures apply.","Review documents every 3 years or upon expiry."],
  HIGH:["Reinforced due diligence measures apply.","Review documents every year or upon expiry."],
  OL:["No measures apply - client must be offboarded immediately."]
};
var RC={
  LOW:{c:"#3B6D11",bg:"#EAF3DE",bd:"#639922"},
  MEDIUM:{c:"#854F0B",bg:"#FAEEDA",bd:"#BA7517"},
  HIGH:{c:"#A32D2D",bg:"#FCEBEB",bd:"#E24B4A"},
  OL:{c:"#3C3489",bg:"#EEEDFE",bd:"#534AB7"}
};

var state={page:0,ans:{},debt:"",result:null,showBk:false};

function debtBand(v){return v<=15000?1:v<=500000?2:3;}
function bkColor(v){return v===3?"#E24B4A":v===2?"#EF9F27":"#639922";}

function calcResult(ans){
  var dr=debtBand(parseFloat(ans.debt_amount)||0);
  var vals={};
  for(var k in ans) vals[k]=ans[k];
  vals.debt_risk=dr;
  var score=0;
  for(var k in W) score+=(Number(vals[k])||0)*W[k];
  var level=score<1.5?"LOW":score<2.3?"MEDIUM":score<2.9?"HIGH":"OL";
  return{score:Math.round(score*100)/100,level:level,debt_risk:dr};
}

function pageOk(){
  var p=PAGES[state.page];
  if(p.isDebt){var v=parseFloat(state.debt);return state.debt!==""&&!isNaN(v)&&v>=0;}
  for(var i=0;i<p.fields.length;i++){if(state.ans[p.fields[i].key]===undefined)return false;}
  return true;
}

function goNext(){
  var p=PAGES[state.page];
  if(p.isDebt) state.ans.debt_amount=parseFloat(state.debt);
  if(state.page<PAGES.length-1){state.page++;draw();}
  else{state.result=calcResult(state.ans);draw();}
}

function draw(){
  var root=document.getElementById("root");
  root.innerHTML=state.result?buildResult():buildForm();
  bind();
}

function buildResult(){
  var r=state.result;
  var cfg=RC[r.level];
  var pct=Math.min(Math.max(((r.score-1)/2)*100,0),98);
  var aleft=(pct-1.2)+"%";
  var displayLevel=r.level==="OL"?"OFF LIMITS":r.level;
  var mhtml="";
  var marr=MEASURES[r.level];
  for(var i=0;i<marr.length;i++){
    mhtml+='<div class="mrow"><span style="color:'+cfg.c+';font-size:18px;line-height:1.2">&#8250;</span><span class="mtext">'+marr[i]+'</span></div>';
  }
  var dr=debtBand(parseFloat(state.ans.debt_amount)||0);
  var vals={};
  for(var k in state.ans) vals[k]=state.ans[k];
  vals.debt_risk=dr;
  var items=[];
  var mx=0;
  for(var k in W){
    var vv=Number(vals[k])||0;
    var c=vv*W[k];
    items.push({key:k,v:vv,c:c});
    if(c>mx) mx=c;
  }
  var bkhtml="";
  if(state.showBk){
    for(var i=0;i<items.length;i++){
      var it=items[i];
      var w=mx>0?((it.c/mx)*100):0;
      bkhtml+='<div class="bkrow"><div class="bklabel">'+WLAB[it.key]+'</div><div class="bktrack"><div class="bkfill" style="width:'+w+'%;background:'+bkColor(it.v)+'"></div></div><div class="bkval">'+it.c.toFixed(2)+'</div></div>';
    }
  }
  return '<div class="toptag">KYC RISK ASSESSMENT - ALGEBRA CAPITAL</div>'+
    '<div class="rbadge" style="background:'+cfg.bg+';border:1.5px solid '+cfg.bd+'">'+
      '<div style="font-size:13px;font-weight:600;color:'+cfg.c+';margin-bottom:8px">Risk classification</div>'+
      '<div class="rlevel" style="color:'+cfg.c+'">'+displayLevel+'</div>'+
      '<div class="rscore" style="color:'+cfg.c+'">Score: '+r.score.toFixed(2)+' / 3.00</div>'+
      '<div class="barwrap">'+
        '<div class="bartrack">'+
          '<div style="width:25%;background:#639922"></div>'+
          '<div style="width:40%;background:#EF9F27"></div>'+
          '<div style="width:30%;background:#E24B4A"></div>'+
          '<div style="width:5%;background:#7F77DD"></div>'+
        '</div>'+
        '<div class="arrowrow"><div class="arrowptr" style="left:'+aleft+'"></div></div>'+
        '<div class="barlabels"><span>1.00</span><span>1.50</span><span>2.30</span><span>2.90</span><span>3.00</span></div>'+
      '</div>'+
    '</div>'+
    '<div class="cards">'+
      '<div class="card"><div class="cardlabel">Debt band</div><div class="cardval">Level '+r.debt_risk+' of 3</div></div>'+
      '<div class="card"><div class="cardlabel">Dominant factor</div><div class="cardval">PEP status (25%)</div></div>'+
    '</div>'+
    '<div class="mbox"><div class="mtitle">Recommended measures</div>'+mhtml+'</div>'+
    '<button class="bkbtn" id="btnbk">'+(state.showBk?"Hide":"Show")+' score breakdown</button>'+
    (state.showBk?'<div class="bkwrap">'+bkhtml+'</div>':'')+
    '<button class="resetbtn" id="btnreset">&#8592; New assessment</button>';
}

function buildForm(){
  var p=PAGES[state.page];
  var pct=(state.page/PAGES.length)*100;
  var body="";
  if(p.isDebt){
    body='<div class="ewrap"><span class="esign">&#8364;</span>'+
      '<input class="dinput" type="number" id="dinput" min="0" placeholder="0.00" value="'+state.debt+'"/></div>'+
      '<div class="shortcuts">'+
        '<div class="sc" data-v="5000">&#8364; 5,000</div>'+
        '<div class="sc" data-v="50000">&#8364; 50,000</div>'+
        '<div class="sc" data-v="200000">&#8364; 200,000</div>'+
        '<div class="sc" data-v="750000">&#8364; 750,000</div>'+
      '</div>'+
      '<div class="hint">Up to &#8364;15,000 = Band 1 &nbsp;|&nbsp; Up to &#8364;500,000 = Band 2 &nbsp;|&nbsp; Above &#8364;500,000 = Band 3</div>';
  } else {
    for(var fi=0;fi<p.fields.length;fi++){
      var f=p.fields[fi];
      body+='<div class="flabel">'+f.label+'</div>';
      for(var oi=0;oi<f.opts.length;oi++){
        var o=f.opts[oi];
        var sel=state.ans[f.key]===o.v?" sel":"";
        body+='<div class="opt'+sel+'" data-key="'+f.key+'" data-val="'+o.v+'">'+
          '<div class="oname">'+o.name+'</div>'+
          '<div class="odesc">'+o.desc+'</div>'+
        '</div>';
      }
    }
  }
  var ok=pageOk();
  var isLast=state.page===PAGES.length-1;
  return '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'+
      '<span class="toptag" style="margin-bottom:0">KYC RISK ASSESSMENT - ALGEBRA CAPITAL</span>'+
      '<span style="font-size:12px;color:#94a3b8">'+(state.page+1)+' / '+PAGES.length+'</span>'+
    '</div>'+
    '<div class="pbar"><div class="pfill" style="width:'+pct+'%"></div></div>'+
    '<div class="ptitle">'+p.title+'</div>'+
    '<div class="psub">'+p.sub+'</div>'+
    body+
    '<div class="row">'+
      (state.page>0?'<button class="btn" id="btnback">&#8592; Back</button>':'')+
      '<button class="btn btnp'+(ok?'':' off')+'" id="btnnext">'+(isLast?'Calculate risk':'Continue')+'</button>'+
    '</div>';
}

function bind(){
  var btnnext=document.getElementById("btnnext");
  if(btnnext) btnnext.onclick=function(){if(pageOk()) goNext();};
  var btnback=document.getElementById("btnback");
  if(btnback) btnback.onclick=function(){state.page--;draw();};
  var btnbk=document.getElementById("btnbk");
  if(btnbk) btnbk.onclick=function(){state.showBk=!state.showBk;draw();};
  var btnreset=document.getElementById("btnreset");
  if(btnreset) btnreset.onclick=function(){state={page:0,ans:{},debt:"",result:null,showBk:false};draw();};
  var opts=document.querySelectorAll(".opt");
  for(var i=0;i<opts.length;i++){
    (function(el){
      el.onclick=function(){
        state.ans[el.getAttribute("data-key")]=parseInt(el.getAttribute("data-val"));
        draw();
      };
    })(opts[i]);
  }
  var scs=document.querySelectorAll(".sc");
  for(var i=0;i<scs.length;i++){
    (function(el){
      el.onclick=function(){state.debt=el.getAttribute("data-v");draw();};
    })(scs[i]);
  }
  var dinput=document.getElementById("dinput");
  if(dinput){
    dinput.oninput=function(){
      state.debt=this.value;
      var btn=document.getElementById("btnnext");
      if(btn){if(pageOk())btn.classList.remove("off");else btn.classList.add("off");}
    };
    dinput.onkeydown=function(e){if(e.key==="Enter"&&pageOk()) goNext();};
    dinput.focus();
  }
}

draw();
</script>
</body>
</html>
